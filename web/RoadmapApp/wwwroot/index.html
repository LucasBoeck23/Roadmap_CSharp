<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roadmap do Boeck</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
    <link href="RoadmapApp.styles.css" rel="stylesheet" />
    <style>
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #0d1117;
            color: #e6edf3;
            gap: 1.5rem;
        }
        .loading-title {
            font-size: 1.4rem;
            font-weight: 600;
        }
        .loading-bar-container {
            width: 280px;
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            overflow: hidden;
        }
        .loading-bar {
            height: 100%;
            width: 30%;
            background: linear-gradient(90deg, #238636, #1f6feb);
            border-radius: 3px;
            animation: loadSlide 1.5s ease-in-out infinite;
        }
        @keyframes loadSlide {
            0% { transform: translateX(-100%); width: 30%; }
            50% { width: 60%; }
            100% { transform: translateX(350%); width: 30%; }
        }
        .loading-status {
            font-size: 0.8rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-title">🚀 Roadmap do Boeck</div>
            <div class="loading-bar-container">
                <div class="loading-bar"></div>
            </div>
            <div class="loading-status">Carregando aplicação...</div>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
